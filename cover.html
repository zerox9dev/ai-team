<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 640px; overflow: hidden; }
  .cover {
    width: 1280px;
    height: 640px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    position: relative;
    overflow: hidden;
  }
  .cover::before {
    content: '';
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .emoji {
    font-size: 64px;
    margin-bottom: 24px;
  }
  .title {
    font-size: 72px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 24px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    margin-bottom: 48px;
  }
  .pipeline {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .agent {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px 20px;
    border-radius: 12px;
    color: rgba(255,255,255,0.8);
    font-size: 16px;
    font-weight: 500;
  }
  .agent .icon {
    font-size: 20px;
  }
  .arrow {
    color: rgba(255,255,255,0.2);
    font-size: 20px;
  }
  .badge {
    position: absolute;
    bottom: 32px;
    right: 40px;
    color: rgba(255,255,255,0.25);
    font-size: 14px;
  }
  .badge-left {
    position: absolute;
    bottom: 32px;
    left: 40px;
    color: rgba(255,255,255,0.25);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="dots"></div>
  <div class="content">
    <div class="emoji">🤖</div>
    <div class="title">AI Team</div>
    <div class="subtitle">Your AI-powered product development team</div>
    <div class="pipeline">
      <div class="agent"><span class="icon">📋</span> PM</div>
      <span class="arrow">→</span>
      <div class="agent"><span class="icon">🎨</span> Designer</div>
      <span class="arrow">→</span>
      <div class="agent"><span class="icon">⚡</span> Engineer</div>
      <span class="arrow">→</span>
      <div class="agent"><span class="icon">🔍</span> QA</div>
      <span class="arrow">→</span>
      <div class="agent"><span class="icon">✅</span> Reviewer</div>
    </div>
  </div>
  <div class="badge-left">Just .md files — works with any AI</div>
  <div class="badge">github.com/zerox9dev/ai-team</div>
</div>
</body>
</html>
